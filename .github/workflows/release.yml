name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release --all-targets

      - name: Package release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $dir = "cs16-tool-${tag}-windows-x64"
          New-Item -ItemType Directory -Path $dir
          Copy-Item "target/release/cs16-tool.exe" "$dir/"
          Copy-Item "target/release/cs16-dump.exe" "$dir/" -ErrorAction SilentlyContinue
          Copy-Item "config.toml" "$dir/" -ErrorAction SilentlyContinue
          Copy-Item "README.md" "$dir/" -ErrorAction SilentlyContinue
          Compress-Archive -Path $dir -DestinationPath "${dir}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cs16-tool-*.zip
